name: Update Config

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch config
        run: |
          set -euo pipefail

          url="http://43.135.28.238/link/jjp2MZMNjjuO3ndo?clash=2"
          outfile="config/0dy.yaml"

          mkdir -p config

          curl -f -L \
            -A "clash-verge/v2.4.7" \
            "$url" \
            -o "$outfile"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate YAML
        run: |
          set -euo pipefail

          file="config/0dy.yaml"

          yq e '.' "$file" > /dev/null
          yq e '.proxies' "$file" > /dev/null
          yq e '.proxy-groups' "$file" > /dev/null
          yq e '.rules' "$file" > /dev/null

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          file="config/0dy.yaml"

          # Remove date line from both versions for comparison
          git show HEAD:"$file" 2>/dev/null | sed '/## 上次更新于：/d' > /tmp/old.yaml || true
          sed '/## 上次更新于：/d' "$file" > /tmp/new.yaml

          if ! diff -q /tmp/old.yaml /tmp/new.yaml > /dev/null 2>&1; then
            git add "$file"
            git commit -m "auto: update config"
            git push
          fi
